<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse quality products at My Store, filter by category, and discover featured items for everyday needs.">
    <meta name="keywords" content="shop products, ecommerce catalog, online shopping, store products">
    <meta name="author" content="My Store">
    <title>My Store | Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html" class="active">Products🛒</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="admin-btn">🔑Login</a>
    </nav>

    <main>
        <section class="page-header">
            <div>
                <h1 style="color: rgb(35, 39, 42); text-align: center;">BROWSE PRODUCTS</h1>
                <p style="color: rgb(29, 31, 33); text-align: center;">Browse featured items and shop with confidence.</p>
                <p id="product-count" class="product-count"></p>
            </div>
            <div class="admin-action-row">
                <a id="login-btn" class="secondary-btn" href="login.html" style="display:block; text-decoration: none;">🔑Admin Login</a>
                <button id="logout-btn" class="secondary-btn" style="display:none;">Logout</button>
            </div>
        </section>

        <div id="message-box" class="message-box" style="display:none;"></div>
        <div class="sync-row" style="display:none;">
            <div id="sync-status" class="sync-status"></div>
            <button id="sync-now-btn" class="secondary-btn sync-action-btn">Sync Now</button>
        </div>

        <section class="filter-section">
            <input type="text" id="search-input" placeholder="Search products..." oninput="filterProducts()">
            <select id="category-filter" onchange="filterProducts()">
                <option value="All">All Categories</option>
                <option value="AUDIO">AUDIO</option>
                <option value="POWER">POWER</option>
                <option value="WEARABLES">WEARABLES</option>
                <option value="CHARGERS">CHARGERS</option>
                <option value="ACCESSORIES">ACCESSORIES</option>
            </select>
        </section>

        <section id="product-container" aria-live="polite"></section>

        <!-- Admin tools moved to admin.html. Admin-only controls are hidden from customers. -->
    </main>

    <footer class="site-footer">
        <p style="color: rgb(69, 92, 246);">© 2026 Welcome to👖 Donny(Drip District)🧥🛒store.. All rights reserved.</p>
        <div class="social-buttons">
            <a href="https://wa.me/+233 53 988 2324" target="_blank" class="whatsapp-btn">Chat on WhatsApp</a>
            <a href="https://www.tiktok.com/@kekcy_couture?_r=1&_t=ZS-980dScVUda0" target="_blank" class="tiktok-btn">Follow on TikTok</a>
        </div>
    </footer>

    <div id="image-modal" class="image-modal" onclick="closeImageModal()">
        <div class="image-modal-content" onclick="event.stopPropagation()">
            <button type="button" class="modal-close" onclick="closeImageModal()" aria-label="Close image">×</button>
            <img id="modal-image" src="" alt="Selected product image">
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
